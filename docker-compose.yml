version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: security_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=0407
      - POSTGRES_DB=security
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - security_network
    restart: always

  redis:
    image: redis:alpine
    container_name: security_redis
    ports:
      - "6379:6379"
    networks:
      - security_network
    restart: always

  adminer:
    image: adminer
    container_name: security_adminer
    ports:
      - "8081:8080"
    networks:
      - security_network
    restart: always

networks:
  security_network:
    driver: bridge

volumes:
  postgres_data:
